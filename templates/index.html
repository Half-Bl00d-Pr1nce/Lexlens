<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LexLens</title>
</head>

<body>

    <h1>LexLens</h1>

    <p>Upload a book page to discover the meanings of underlined words.</p>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="file"
            name="image"
            accept="image/*"
            required
        >

        <button type="submit">
            Upload Image
        </button>

    </form>

</body>

</html>
